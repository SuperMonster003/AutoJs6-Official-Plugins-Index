name: Plugin Index

on:
  pull_request:
    paths:
      - plugins.official.generated.json
      - tools/generate_official_plugin_index.py
      - .github/workflows/plugin-index.yml
  push:
    branches:
      - main
    paths:
      - plugins.official.generated.json
      - tools/generate_official_plugin_index.py
      - .github/workflows/plugin-index.yml
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 1"

jobs:
  validate-official-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Generate official plugins index
        run: python3 tools/generate_official_plugin_index.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Check generated official index
        run: git diff --exit-code -- plugins.official.generated.json
